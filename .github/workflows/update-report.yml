name: Report aktualisieren

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Report generieren
        run: python saisonmanager_report.py

      - name: Report nach docs/ kopieren
        run: |
          mkdir -p docs
          cp output/liga_report.html docs/index.html

      - name: Änderungen committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "Report aktualisiert $(date +'%Y-%m-%d %H:%M')"
          git push
